<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMetrics | Comparar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    </head>
<body class="min-h-screen">
<div id="sidebar-container"></div>
<main class="ml-60 min-h-screen p-8">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-900">Comparar Campanhas</h2>
        <p class="text-slate-500 text-sm mt-0.5">Analisa duas campanhas lado a lado</p>
    </div>

    <!-- Selectors -->
    <div class="grid grid-cols-2 gap-5 mb-8">
        <div class="card p-5 shadow-sm">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-2">Campanha A</label>
            <select id="select-a" class="field" onchange="compare()"><option value="">— Seleciona —</option></select>
        </div>
        <div class="card p-5 shadow-sm">
            <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-2">Campanha B</label>
            <select id="select-b" class="field" onchange="compare()"><option value="">— Seleciona —</option></select>
        </div>
    </div>

    <div id="compare-results" class="hidden">
        <!-- Header cards -->
        <div class="grid grid-cols-2 gap-5 mb-6">
            <div id="header-a" class="card p-5 shadow-sm" style="border-top:3px solid #2563eb"></div>
            <div id="header-b" class="card p-5 shadow-sm" style="border-top:3px solid #0891b2"></div>
        </div>

        <!-- KPI comparison -->
        <div class="card p-6 shadow-sm mb-6">
            <h3 class="text-sm font-semibold text-slate-700 mb-5">Comparação de Métricas</h3>
            <div class="space-y-5" id="kpi-compare"></div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div class="card p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 mb-4">Engagement Total</h3>
                <canvas id="barChart" height="200"></canvas>
            </div>
            <div class="card p-6 shadow-sm">
                <h3 class="text-sm font-semibold text-slate-700 mb-4">% Objetivos Alcançados</h3>
                <canvas id="pctChart" height="200"></canvas>
            </div>
        </div>
    </div>

    <div id="compare-empty" class="text-center py-20 text-slate-400 text-sm">
        Seleciona duas campanhas para comparar.
    </div>
</main>

<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
    Chart.defaults.color       = "#94a3b8";
    Chart.defaults.borderColor = "#f1f5f9";
    const scaleOpts = { ticks:{color:"#94a3b8"}, grid:{color:"#f1f5f9"} };
    let barChart, pctChart;

    async function init() {
        const profile=await getUserProfile(); if(!profile) return;
        buildSidebar("compare.html", profile.role);
        const {data:camps}=await supabaseClient.from("campanhas").select("id,nome,cor").order("created_at",{ascending:false});
        if(!camps) return;
        const opts=camps.map(c=>`<option value="${c.id}">${c.nome}</option>`).join("");
        document.getElementById("select-a").innerHTML=`<option value="">— Seleciona —</option>${opts}`;
        document.getElementById("select-b").innerHTML=`<option value="">— Seleciona —</option>${opts}`;
    }

    async function compare() {
        const idA=document.getElementById("select-a").value, idB=document.getElementById("select-b").value;
        if(!idA||!idB||idA===idB){document.getElementById("compare-results").classList.add("hidden");document.getElementById("compare-empty").classList.remove("hidden");document.getElementById("compare-empty").textContent=idA===idB&&idA?"Seleciona campanhas diferentes.":"Seleciona duas campanhas para comparar.";return;}

        const [ra,rb]=await Promise.all([
            supabaseClient.from("campanhas").select("*,posts(*)").eq("id",idA).single(),
            supabaseClient.from("campanhas").select("*,posts(*)").eq("id",idB).single()
        ]);
        const ca=ra.data, cb=rb.data; if(!ca||!cb) return;

        document.getElementById("compare-results").classList.remove("hidden");
        document.getElementById("compare-empty").classList.add("hidden");

        const stats=camp=>{
            const ps=camp.posts||[];
            return {
                posts: ps.length,
                likes:       ps.reduce((a,b)=>a+(b.likes_real||0),0),
                comentarios: ps.reduce((a,b)=>a+(b.comentarios_real||0),0),
                partilhas:   ps.reduce((a,b)=>a+(b.partilhas_real||0),0),
                score:       ps.reduce((a,b)=>a+(b.likes_real||0)*2+(b.comentarios_real||0)*3.5+(b.partilhas_real||0)*4.5,0),
                oLikes:      camp.likes_objetivo||0,
                oComent:     camp.comentarios_objetivo||0,
                oPart:       camp.partilhas_objetivo||0,
            };
        };
        const sa=stats(ca), sb=stats(cb);

        const renderHeader=(el,camp,s)=>{
            const cor=camp.cor||"#2563eb";
            el.style.borderTopColor=cor;
            el.innerHTML=`<div class="flex items-center gap-2 mb-1"><div class="w-2.5 h-2.5 rounded-full" style="background:${cor}"></div><h3 class="text-base font-bold text-slate-900">${camp.nome}</h3></div>
                <p class="text-xs text-slate-400 mb-3">${camp.plataforma} · ${s.posts} posts</p>
                <div class="grid grid-cols-3 gap-3 text-center">
                    <div><p class="text-lg font-bold text-slate-900">${s.likes}</p><p class="text-[10px] text-slate-400 uppercase font-semibold mt-0.5">Likes</p></div>
                    <div><p class="text-lg font-bold text-slate-900">${s.comentarios}</p><p class="text-[10px] text-slate-400 uppercase font-semibold mt-0.5">Coment.</p></div>
                    <div><p class="text-lg font-bold" style="color:${cor}">${s.score.toFixed(0)}</p><p class="text-[10px] text-slate-400 uppercase font-semibold mt-0.5">Score</p></div>
                </div>`;
        };
        renderHeader(document.getElementById("header-a"),ca,sa);
        renderHeader(document.getElementById("header-b"),cb,sb);

        const metrics=[
            {label:"❤️ Likes",       keyA:sa.likes,       keyB:sb.likes},
            {label:"💬 Comentários",  keyA:sa.comentarios, keyB:sb.comentarios},
            {label:"🔁 Partilhas",    keyA:sa.partilhas,   keyB:sb.partilhas},
            {label:"⭐ Score Total",  keyA:sa.score,       keyB:sb.score},
        ];
        const corA=ca.cor||"#2563eb", corB=cb.cor||"#0891b2";
        document.getElementById("kpi-compare").innerHTML=metrics.map(m=>{
            const max=Math.max(m.keyA,m.keyB,1);
            const pA=Math.round((m.keyA/max)*100), pB=Math.round((m.keyB/max)*100);
            const winner=m.keyA>m.keyB?"A":m.keyA<m.keyB?"B":"=";
            return `<div>
                <div class="flex justify-between text-xs font-semibold text-slate-500 mb-2">
                    <span>${m.label}</span>
                    ${winner!=="="?`<span class="px-1.5 py-0.5 rounded text-[10px] font-bold" style="background:${winner==="A"?corA+"22":corB+"22"};color:${winner==="A"?corA:corB}">${winner==="A"?ca.nome:cb.nome} lidera</span>`:`<span class="text-slate-400 text-[10px]">Empate</span>`}
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><div class="flex justify-between text-xs mb-1"><span class="text-slate-500">${ca.nome}</span><span class="font-bold text-slate-800">${typeof m.keyA==="number"&&!Number.isInteger(m.keyA)?m.keyA.toFixed(1):m.keyA}</span></div><div class="prog-bg"><div class="prog-fill" style="width:${pA}%;background:${corA}"></div></div></div>
                    <div><div class="flex justify-between text-xs mb-1"><span class="text-slate-500">${cb.nome}</span><span class="font-bold text-slate-800">${typeof m.keyB==="number"&&!Number.isInteger(m.keyB)?m.keyB.toFixed(1):m.keyB}</span></div><div class="prog-bg"><div class="prog-fill" style="width:${pB}%;background:${corB}"></div></div></div>
                </div>
            </div>`;
        }).join("");

        if(barChart) barChart.destroy();
        barChart=new Chart(document.getElementById("barChart"),{type:"bar",data:{labels:["Likes","Comentários","Partilhas","Score"],datasets:[
            {label:ca.nome,data:[sa.likes,sa.comentarios,sa.partilhas,sa.score],backgroundColor:corA,borderRadius:4},
            {label:cb.nome,data:[sb.likes,sb.comentarios,sb.partilhas,sb.score],backgroundColor:corB,borderRadius:4}
        ]},options:{responsive:true,plugins:{legend:{labels:{color:"#94a3b8"}}},scales:{x:scaleOpts,y:scaleOpts}}});

        const pctA=[sa.oLikes>0?Math.min(Math.round((sa.likes/sa.oLikes)*100),100):0,sa.oComent>0?Math.min(Math.round((sa.comentarios/sa.oComent)*100),100):0,sa.oPart>0?Math.min(Math.round((sa.partilhas/sa.oPart)*100),100):0];
        const pctB=[sb.oLikes>0?Math.min(Math.round((sb.likes/sb.oLikes)*100),100):0,sb.oComent>0?Math.min(Math.round((sb.comentarios/sb.oComent)*100),100):0,sb.oPart>0?Math.min(Math.round((sb.partilhas/sb.oPart)*100),100):0];
        if(pctChart) pctChart.destroy();
        pctChart=new Chart(document.getElementById("pctChart"),{type:"bar",data:{labels:["Likes","Comentários","Partilhas"],datasets:[
            {label:ca.nome,data:pctA,backgroundColor:corA,borderRadius:4},
            {label:cb.nome,data:pctB,backgroundColor:corB,borderRadius:4}
        ]},options:{responsive:true,plugins:{legend:{labels:{color:"#94a3b8"}}},scales:{x:scaleOpts,y:{...scaleOpts,max:100,ticks:{callback:v=>v+"%"}}}}});
    }

    init();
</script>
</body>
</html>
