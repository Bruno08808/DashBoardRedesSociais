<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdMetrics | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .field.error { border-color:#ef4444; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-slate-900">AdMetrics<span class="text-blue-600">.io</span></h1>
            <p class="text-slate-500 text-sm mt-1">Dashboard de Performance</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
            <!-- Tabs -->
            <div class="flex mb-6 border-b border-slate-200">
                <button id="tab-login" onclick="switchTab('login')"
                    class="flex-1 pb-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 transition">
                    Entrar
                </button>
                <button id="tab-register" onclick="switchTab('register')"
                    class="flex-1 pb-3 text-sm font-medium text-slate-400 border-b-2 border-transparent hover:text-slate-600 transition">
                    Criar conta
                </button>
            </div>

            <!-- LOGIN -->
            <div id="form-login" class="space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Email</label>
                    <input id="login-email" type="email" class="field" placeholder="o_teu@email.com" autocomplete="email">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Password</label>
                    <input id="login-password" type="password" class="field" placeholder="••••••••"
                           autocomplete="current-password" onkeydown="if(event.key==='Enter') login()">
                </div>
                <button onclick="login()" id="btn-login"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
                    Entrar
                </button>
            </div>

            <!-- REGISTER -->
            <div id="form-register" class="hidden space-y-4">
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Email</label>
                    <input id="reg-email" type="email" class="field" placeholder="o_teu@email.com" autocomplete="email">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Password</label>
                    <input id="reg-password" type="password" class="field" placeholder="Mínimo 6 caracteres"
                           autocomplete="new-password" oninput="validarPasswords()">
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Confirmar Password</label>
                    <input id="reg-password-confirm" type="password" class="field" placeholder="Repete a password"
                           autocomplete="new-password" oninput="validarPasswords()"
                           onkeydown="if(event.key==='Enter') register()">
                    <p id="pass-match-msg" class="text-xs mt-1.5 hidden"></p>
                </div>
                <label class="flex items-start gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:border-blue-300 transition group">
                    <input type="checkbox" id="reg-admin-request" class="w-4 h-4 mt-0.5 accent-blue-600 flex-shrink-0">
                    <div>
                        <p class="text-slate-800 text-sm font-semibold">Pedir acesso Admin</p>
                        <p class="text-slate-400 text-xs mt-0.5 leading-relaxed">
                            Pedido ficará pendente até ser aprovado. Podes entrar como visitante entretanto.
                        </p>
                    </div>
                </label>
                <button onclick="register()" id="btn-register"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition text-sm">
                    Criar Conta
                </button>
            </div>

            <div id="auth-msg" class="hidden mt-4 p-3 rounded-lg text-sm text-center font-medium"></div>
        </div>
        <p class="text-center text-slate-400 text-xs mt-5">AdMetrics v1.0 — uso interno</p>
    </div>

    <script src="supabase.js"></script>
    <script>
        function switchTab(tab) {
            const isLogin = tab === "login";
            document.getElementById("form-login").classList.toggle("hidden", !isLogin);
            document.getElementById("form-register").classList.toggle("hidden", isLogin);
            document.getElementById("tab-login").className    = `flex-1 pb-3 text-sm font-semibold transition border-b-2 ${isLogin  ? "text-blue-600 border-blue-600" : "text-slate-400 border-transparent hover:text-slate-600"}`;
            document.getElementById("tab-register").className = `flex-1 pb-3 text-sm font-medium transition border-b-2 ${!isLogin ? "text-blue-600 border-blue-600" : "text-slate-400 border-transparent hover:text-slate-600"}`;
            hideMsg();
        }
        function validarPasswords() {
            const p1=document.getElementById("reg-password").value, p2=document.getElementById("reg-password-confirm").value;
            const msg=document.getElementById("pass-match-msg"), btn=document.getElementById("btn-register"), inp=document.getElementById("reg-password-confirm");
            if (!p2) { msg.classList.add("hidden"); inp.classList.remove("error"); btn.disabled=false; return; }
            if (p1===p2) { msg.textContent="✓ Passwords coincidem"; msg.className="text-xs mt-1.5 text-blue-600"; msg.classList.remove("hidden"); inp.classList.remove("error"); btn.disabled=false; }
            else { msg.textContent="As passwords não coincidem"; msg.className="text-xs mt-1.5 text-red-500"; msg.classList.remove("hidden"); inp.classList.add("error"); btn.disabled=true; }
        }
        function showMsg(text, isError=false) {
            const el=document.getElementById("auth-msg");
            el.textContent=text;
            el.className=`mt-4 p-3 rounded-lg text-sm text-center font-medium ${isError?"bg-red-50 border border-red-200 text-red-600":"bg-blue-50 border border-blue-200 text-blue-700"}`;
            el.classList.remove("hidden");
        }
        function hideMsg() { document.getElementById("auth-msg").classList.add("hidden"); }
        async function login() {
            const email=document.getElementById("login-email").value.trim(), password=document.getElementById("login-password").value;
            if (!email||!password) { showMsg("Preenche o email e a password.", true); return; }
            const btn=document.getElementById("btn-login"); btn.textContent="A entrar..."; btn.disabled=true;
            const {error}=await supabaseClient.auth.signInWithPassword({email,password});
            btn.textContent="Entrar"; btn.disabled=false;
            if (error) { showMsg("Email ou password incorretos.", true); }
            else { window.location.href="crescimento.html"; }
        }
        async function register() {
            const email=document.getElementById("reg-email").value.trim(), password=document.getElementById("reg-password").value;
            const confirm=document.getElementById("reg-password-confirm").value, wantsAdmin=document.getElementById("reg-admin-request").checked;
            if (!email||!password||!confirm) { showMsg("Preenche todos os campos.", true); return; }
            if (password.length<6) { showMsg("A password precisa de pelo menos 6 caracteres.", true); return; }
            if (password!==confirm) { showMsg("As passwords não coincidem.", true); return; }
            const btn=document.getElementById("btn-register"); btn.textContent="A criar conta..."; btn.disabled=true;
            const {data,error}=await supabaseClient.auth.signUp({email,password});
            btn.textContent="Criar Conta"; btn.disabled=false;
            if (error) { showMsg(error.message, true); return; }
            if (data.user) {
                const role=wantsAdmin?"pending_admin":"viewer";
                await supabaseClient.from("profiles").insert([{id:data.user.id,role,email}]);
                showMsg(wantsAdmin?"Conta criada! Pedido de admin pendente. Podes entrar como visitante.":"Conta criada! Podes entrar agora.");
                switchTab("login");
            }
        }
    </script>
</body>
</html>
